# ===== Application =====
spring.application.name=VoxLy
spring.output.ansi.enabled=ALWAYS
spring.main.banner-mode=console

# ===== Server =====
server.port=8080

# ===== Datasource =====
spring.datasource.url=jdbc:postgresql://localhost:5432/voxly
spring.datasource.username=voxly
spring.datasource.password=voxly
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

# ===== JWT =====
app.jwt.secret-key=ZTQ5ZGU2MjctYzc5My00NjMwLTk3MTEtMzRkMGQyMjUyMzJkLXZveGx5LWRldi1rZXk
app.jwt.issuer=VoxLy
app.jwt.audience=VoxLy
app.jwt.access-token-expiry-minutes=15
app.jwt.refresh-token-expiry-days=7

# ===== Mail (dev - MailHog / Mailpit) =====
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
app.mail.from-email=noreply@voxly.com
app.mail.from-name=VoxLy
app.mail.base-url=http://localhost:8081

# ===== Spring Security - permit all for dev, configure properly for prod =====
spring.security.user.name=admin
spring.security.user.password=admin

# ===== Swagger =====
springdoc.swagger-ui.path=/swagger-ui.html
