# DotEnv configuration - loads .env from backend directory
springdotenv:
  directory: .

spring:
  application:
    name: VoxLy
  output:
    ansi:
      enabled: ALWAYS
  main:
    banner-mode: console

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/voxly}
    username: ${DATABASE_USERNAME:voxly_user}
    password: ${DATABASE_PASSWORD:voxly_password}
    driver-class-name: ${DATABASE_DRIVER:org.postgresql.Driver}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 4
    baseline-description: legacy-hibernate-schema
    clean-disabled: false
    clean-on-validation-error: true

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_AUTH_ENABLED:false}
          starttls:
            enable: ${MAIL_STARTTLS_ENABLED:false}

cloudflare:
  r2:
    endpoint: ${CLOUDFLARE_R2_ENDPOINT:http://localhost:9000}
    region: ${CLOUDFLARE_R2_REGION:auto}
    accessKeyId: ${CLOUDFLARE_R2_ACCESS_KEY_ID:}
    accessKeySecret: ${CLOUDFLARE_R2_ACCESS_KEY_SECRET:}
    bucketName: ${CLOUDFLARE_R2_BUCKET_NAME:voxly-sessions}
    publicUrl: ${CLOUDFLARE_R2_PUBLIC_URL:http://localhost:8080/uploads}

openai:
  apiKey: ${OPENAI_API_KEY:}
  whisper:
    model: ${OPENAI_WHISPER_MODEL:whisper-1}
    supportedLanguages: ${OPENAI_SUPPORTED_LANGUAGES:en,es}
    defaultLanguage: ${OPENAI_DEFAULT_LANGUAGE:en}
  gpt:
    model: ${OPENAI_GPT_MODEL:gpt-3.5-turbo}
    maxTokens: ${OPENAI_GPT_MAX_TOKENS:1500}
    temperature: ${OPENAI_GPT_TEMPERATURE:0.7}

storage:
  temp-dir: ${STORAGE_TEMP_DIR:/tmp/voxly-temp}
  max-upload-size: ${MAX_FILE_SIZE_BYTES:104857600}
  allowed-video-types: video/mp4,video/quicktime,video/x-msvideo,video/webm
  allowed-slide-types: application/pdf,application/vnd.ms-powerpoint,application/vnd.openxmlformats-officedocument.presentationml.presentation
  ffmpeg:
    path: ${FFMPEG_PATH:ffmpeg}
    audio-format: ${FFMPEG_AUDIO_FORMAT:wav}
    audio-bitrate: ${FFMPEG_AUDIO_BITRATE:128k}
    audio-samplerate: ${FFMPEG_AUDIO_SAMPLERATE:16000}

notification:
  email:
    from: ${SMTP_FROM_EMAIL:noreply@voxly.app}
    admin: ${ADMIN_EMAIL:admin@voxly.app}
  base-url: ${APP_BASE_URL:http://localhost:3000}

server:
  port: ${SERVER_PORT:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret-key: ${JWT_SECRET_KEY:ZTQ5ZGU2MjctYzc5My00NjMwLTk3MTEtMzRkMGQyMjUyMzJkLXZveGx5LWRldi1rZXk}
    issuer: ${JWT_ISSUER:VoxLy}
    audience: ${JWT_AUDIENCE:VoxLy}
    access-token-expiry-minutes: ${JWT_ACCESS_TOKEN_EXPIRY_MINUTES:15}
    refresh-token-expiry-days: ${JWT_REFRESH_TOKEN_EXPIRY_DAYS:7}
    access-cookie-secure: ${JWT_ACCESS_COOKIE_SECURE:false}
  auth:
    dev-bypass-enabled: ${AUTH_DEV_BYPASS_ENABLED:false}
    dev-email: ${AUTH_DEV_EMAIL:}
    dev-password: ${AUTH_DEV_PASSWORD:}
  mail:
    from-email: ${SMTP_FROM_EMAIL:noreply@voxly.com}
    from-name: ${APP_NAME:VoxLy}
    base-url: ${APP_BASE_URL:http://localhost:3000}
  storage:
    type: ${STORAGE_TYPE:s3}
    base-url: ${STORAGE_BASE_URL:/api/v1/files}
    max-file-size-bytes: ${MAX_FILE_SIZE_BYTES:104857600}