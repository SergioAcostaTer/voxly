spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

logging:
  level:
    root: INFO
    org.springframework: WARN
    org.hibernate: WARN
    org.hibernate.SQL: OFF
    org.hibernate.orm.jdbc.bind: OFF
    org.springframework.web: WARN
    org.springframework.web.client: WARN
    org.springframework.security: WARN
    com.zaxxer.hikari: WARN
    com.pigs.voxly: INFO

app:
  auth:
    testing-open-access: true
    dev-bypass-enabled: true
    dev-email: test@voxly.local
    dev-username: testuser
    dev-user-id: 11111111-1111-1111-1111-111111111111
    dev-password: test123
  ai:
    provider: ${AI_PROVIDER:openai}
  analysis:
    rate-limit:
      enabled: ${ANALYSIS_RATE_LIMIT_ENABLED:true}
