services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_AUTH_BYPASS: ${VITE_AUTH_BYPASS:-false}
    container_name: voxly-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  ai-analyzer:
    build:
      context: ../ai
      dockerfile: Dockerfile
    container_name: voxly-ai-analyzer
    restart: unless-stopped
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voxly-backend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      POSTURE_ANALYZER_ENABLED: ${POSTURE_ANALYZER_ENABLED:-true}
      POSTURE_ANALYZER_URL: ${POSTURE_ANALYZER_URL:-http://ai-analyzer:8000}
      POSTURE_ANALYZER_RENDER_BASE: ${POSTURE_ANALYZER_RENDER_BASE:-http://localhost:8001}
      SERVER_PORT: ${SERVER_PORT:-8080}
      AUTH_DEV_BYPASS_ENABLED: ${AUTH_DEV_BYPASS_ENABLED:-false}
      AUTH_TESTING_OPEN_ACCESS: ${AUTH_TESTING_OPEN_ACCESS:-false}
      AUTH_DEV_EMAIL: ${AUTH_DEV_EMAIL:-test@voxly.local}
      AUTH_DEV_USERNAME: ${AUTH_DEV_USERNAME:-testuser}
      AUTH_DEV_USER_ID: ${AUTH_DEV_USER_ID:-11111111-1111-1111-1111-111111111111}
      JWT_ACCESS_COOKIE_SECURE: ${JWT_ACCESS_COOKIE_SECURE:-false}
      MANAGEMENT_HEALTH_MAIL_ENABLED: "false"
    depends_on:
      ai-analyzer:
        condition: service_healthy
    ports:
      - "${SERVER_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health/readiness"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
